<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact Us | Online MBA Chennai</title>

  <meta
    name="description"
    content="Contact us to apply for Online MBA Courses in Chennai."
  />

  <style>
    body{
      font-family:Arial;
      margin:0;
      background:#f4f4f4;
    }

    header, footer{
      background:#0b3d91;
      color:white;
      padding:20px;
      text-align:center;
    }

    nav a{
      color:white;
      margin:0 15px;
      text-decoration:none;
    }

    .container{
      background:white;
      margin:30px;
      padding:40px;
      border-radius:10px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      margin-bottom:20px;
    }

    button{
      background:#0b3d91;
      color:white;
      padding:12px 20px;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>Contact Us</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="blog.html">Blog</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">

  <h2>Apply for Online MBA</h2>

  <br>

  <form>

    <label>Name</label>
    <input type="text" placeholder="Enter your name">

    <label>Email</label>
    <input type="email" placeholder="Enter your email">

    <label>Phone</label>
    <input type="text" placeholder="Enter your phone number">

    <label>Message</label>
    <textarea rows="5" placeholder="Your message"></textarea>

    <button type="submit">Submit</button>

  </form>

</div>

<footer>
  <p>© 2026 Chennai MBA</p>
</footer>

</html>
